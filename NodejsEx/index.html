<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <title>Hello, world!</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <section class="vh-100">
    <div class="container-fluid h-custom">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-md-9 col-lg-6 col-xl-5">
          <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp" class="img-fluid"
            alt="Sample image">
        </div>
        <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
          <form>

            <div class="divider d-flex align-items-center my-4 justify-content-center">
              <p class="lead fw-normal mb-0 me-3">Sign in with</p>
            </div>
            <div class="d-flex flex-row align-items-center justify-content-center ">

              <a href="#" class="btn btn-outline-dark btn-floating mx-1">
                <i class="bi bi-google"></i>
              </a>
              <a href="#" class="btn btn-outline-primary btn-floating mx-1">
                <i class="bi bi-facebook"></i>
              </a>

              <a href="#" class="btn btn-outline-primary btn-floating mx-1">
                <i class="bi bi-twitter"></i>
              </a>
            </div>

            <div class="divider d-flex align-items-center my-4 justify-content-center">
              <p class="text-center fw-bold mx-3 mb-0 ">Or</p>
            </div>

            <!-- Email input -->
            <div class="form-outline mb-4">
              <label class="form-label form__label ml-2" for="form3Example3">Email address</label>
              <input type="email" id="form3Example3" class="form-control form-control-lg form__input"
                placeholder="Enter a valid email address" />

            </div>

            <!-- Password input -->
            <div class="form-outline mb-3">
              <label class="form-label form__label" for="form3Example4">Password</label>
              <input type="password" id="form3Example4" class="form-control form-control-lg form__input"
                placeholder="Enter password" />

              <div class="d-flex justify-content-between align-items-center mt-3 ms-3 me-3">

                <!-- Checkbox -->
                <div class="form-check mb-0">
                  <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3" />
                  <label class="form-check-label" for="form2Example3">
                    Show Password
                  </label>

                </div>
                <a href="#!" class="text-body">Forgot password?</a>
              </div>
            </div>
            <div class="text-center align-items-center justify-content-center text-lg-start mt-4 pt-2">
              <button type="button" class="btn btn-primary btn-lg"
                style="padding-left: 2.5rem; padding-right: 2.5rem;">Login</button>

              <p class="small fw-bold mt-2 pt-1 mb-0">Don't have an account? <a href="#!"
                  class="link-primary">Register</a></p>
            </div>

          </form>
          <br><br><br><br>
        </div>
      </div>
    </div>

  </section>

  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
</body>

</html>
